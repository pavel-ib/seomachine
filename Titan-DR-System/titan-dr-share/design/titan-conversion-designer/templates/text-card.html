<!--
  Template: Text Card (Story/Letter/Urgency)
  Use for: Pattern 7 (FAQ/PAS), Pattern 11 (Text Bomb), Pattern 26 (Urgency), text-heavy cards
  No Gemini base image needed — this IS the ad.
  Variables: {{BG_COLOR}}, {{EMOJI_LINE}}, {{HEADLINE}}, {{BODY_TEXT}}, {{OFFER_LINE}},
             {{URGENCY_LINE}}, {{SIGNOFF}}, {{HEADLINE_COLOR}}, {{BODY_COLOR}},
             {{OFFER_COLOR}}, {{FONT_SIZE_HEADLINE}}, {{FONT_SIZE_BODY}}
  Screenshot: npx puppeteer screenshot text-card.html --width=1080 --height=1350
-->
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');

  .container {
    width: 1080px;
    height: 1350px;
    background: {{BG_COLOR}};
    padding: 80px 70px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .emoji-line {
    font-size: 56px;
    margin-bottom: 32px;
  }

  .headline {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: {{FONT_SIZE_HEADLINE}};
    line-height: 1.15;
    color: {{HEADLINE_COLOR}};
    text-transform: uppercase;
    margin-bottom: 36px;
    letter-spacing: 1px;
  }

  .body-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: {{FONT_SIZE_BODY}};
    line-height: 1.6;
    color: {{BODY_COLOR}};
    margin-bottom: 36px;
    max-width: 880px;
  }

  .offer-line {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 36px;
    color: {{OFFER_COLOR}};
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .urgency-line {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: {{BODY_COLOR}};
    opacity: 0.8;
    margin-bottom: 32px;
  }

  .signoff {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 20px;
    color: {{BODY_COLOR}};
    opacity: 0.7;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="emoji-line">{{EMOJI_LINE}}</div>
    <div class="headline">{{HEADLINE}}</div>
    <div class="body-text">{{BODY_TEXT}}</div>
    <div class="offer-line">{{OFFER_LINE}}</div>
    <div class="urgency-line">{{URGENCY_LINE}}</div>
    <div class="signoff">{{SIGNOFF}}</div>
  </div>
</body>
</html>
