<!--
  Template: Headline + Offer Strip
  Use for: Product Hero + Discount, Holiday Offer, Urgency patterns
  Variables: {{BACKGROUND_IMAGE}}, {{HEADLINE}}, {{SUBHEAD}}, {{OFFER_TEXT}},
             {{OFFER_BG_COLOR}}, {{FONT_COLOR}}, {{BRAND_LOGO_URL}}
  Screenshot: npx puppeteer screenshot headline-offer.html --width=1080 --height=1350
-->
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

  .container {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }

  .bg-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.5) 0%,
      rgba(0,0,0,0) 35%,
      rgba(0,0,0,0) 70%,
      rgba(0,0,0,0.6) 100%
    );
  }

  .headline {
    position: absolute;
    top: 60px;
    left: 50px;
    right: 50px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 58px;
    line-height: 1.1;
    color: {{FONT_COLOR}};
    text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    text-transform: uppercase;
  }

  .subhead {
    position: absolute;
    top: 240px;
    left: 50px;
    right: 50px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.4;
    color: {{FONT_COLOR}};
    text-shadow: 0 1px 6px rgba(0,0,0,0.4);
  }

  .offer-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: {{OFFER_BG_COLOR}};
    padding: 28px 50px;
    text-align: center;
  }

  .offer-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 42px;
    color: white;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .brand-logo {
    position: absolute;
    bottom: 110px;
    right: 40px;
    height: 40px;
    opacity: 0.9;
  }
</style>
</head>
<body>
  <div class="container">
    <img class="bg-image" src="{{BACKGROUND_IMAGE}}" alt="">
    <div class="overlay"></div>
    <div class="headline">{{HEADLINE}}</div>
    <div class="subhead">{{SUBHEAD}}</div>
    <img class="brand-logo" src="{{BRAND_LOGO_URL}}" alt="">
    <div class="offer-strip">
      <div class="offer-text">{{OFFER_TEXT}}</div>
    </div>
  </div>
</body>
</html>
