<!--
  Template: Mechanism Callouts
  Use for: Pattern 12 (Educational Diagram), Mechanism Explainer, Ingredient Science
  Variables: {{BACKGROUND_IMAGE}}, {{HEADLINE}}, {{CALLOUT_1}}, {{CALLOUT_2}}, {{CALLOUT_3}},
             {{CALLOUT_4}}, {{BRAND_LINE}}, {{BG_GRADIENT_START}}, {{BG_GRADIENT_END}},
             {{ACCENT_COLOR}}, {{FONT_COLOR}}
  Screenshot: npx puppeteer screenshot mechanism-callouts.html --width=1080 --height=1350
-->
<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');

  .container {
    position: relative;
    width: 1080px;
    height: 1350px;
    background: linear-gradient(135deg, {{BG_GRADIENT_START}}, {{BG_GRADIENT_END}});
    overflow: hidden;
  }

  .headline {
    position: absolute;
    top: 50px;
    left: 50px;
    right: 50px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 44px;
    line-height: 1.2;
    color: {{FONT_COLOR}};
    text-transform: uppercase;
  }

  .product-area {
    position: absolute;
    top: 200px;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .product-image {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.3));
  }

  .callout {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 340px;
  }

  .callout-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: {{ACCENT_COLOR}};
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }

  .callout-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 18px;
    line-height: 1.3;
    color: {{FONT_COLOR}};
  }

  .callout-1 { top: 280px; left: 40px; }
  .callout-2 { top: 480px; left: 40px; }
  .callout-3 { top: 360px; right: 40px; text-align: right; flex-direction: row-reverse; }
  .callout-4 { top: 560px; right: 40px; text-align: right; flex-direction: row-reverse; }

  .brand-line {
    position: absolute;
    bottom: 50px;
    left: 50px;
    right: 50px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: {{ACCENT_COLOR}};
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="headline">{{HEADLINE}}</div>

    <div class="product-area">
      <img class="product-image" src="{{BACKGROUND_IMAGE}}" alt="">
    </div>

    <div class="callout callout-1">
      <div class="callout-icon">✓</div>
      <div class="callout-text">{{CALLOUT_1}}</div>
    </div>

    <div class="callout callout-2">
      <div class="callout-icon">✓</div>
      <div class="callout-text">{{CALLOUT_2}}</div>
    </div>

    <div class="callout callout-3">
      <div class="callout-icon">✓</div>
      <div class="callout-text">{{CALLOUT_3}}</div>
    </div>

    <div class="callout callout-4">
      <div class="callout-icon">✓</div>
      <div class="callout-text">{{CALLOUT_4}}</div>
    </div>

    <div class="brand-line">{{BRAND_LINE}}</div>
  </div>
</body>
</html>
